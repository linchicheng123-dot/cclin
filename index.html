    <title>KCHAO by CC-LIN | Portfolio</title>

    <script>
      (() => {
        const VERSION = "20260615-clean";
        const fixAssetUrl = (value) => {
          if (!value || typeof value !== "string") return value;
          if (value.startsWith("data:") || value.startsWith("blob:")) return value;

          try {
            let raw = value.trim();
            if (raw.startsWith("/assets/")) raw = "/cclin" + raw;
            const url = new URL(raw, document.baseURI);

            if (url.origin === location.origin) {
              if (url.pathname.startsWith("/assets/")) {
                url.pathname = "/cclin" + url.pathname;
              }
              if (url.pathname.startsWith("/cclin/assets/")) {
                url.searchParams.set("v", VERSION);
                return url.href;
              }
            }
          } catch (error) {}

          return value;
        };

        const fixCssUrls = (value) => {
          if (!value || typeof value !== "string" || !value.includes("assets/")) return value;
          return value.replace(/url\((['"]?)(.*?)\1\)/g, (_, quote, url) => {
            return `url("${fixAssetUrl(url)}")`;
          });
        };

        const originalSetAttribute = Element.prototype.setAttribute;
        Element.prototype.setAttribute = function (name, value) {
          const key = String(name).toLowerCase();
          if ((key === "src" || key === "poster" || key === "href") && typeof value === "string") {
            value = fixAssetUrl(value);
          }
          return originalSetAttribute.call(this, name, value);
        };

        const originalSetProperty = CSSStyleDeclaration.prototype.setProperty;
        CSSStyleDeclaration.prototype.setProperty = function (name, value, priority) {
          return originalSetProperty.call(this, name, fixCssUrls(value), priority);
        };

        for (const prop of ["backgroundImage", "background", "maskImage", "webkitMaskImage"]) {
          const descriptor = Object.getOwnPropertyDescriptor(CSSStyleDeclaration.prototype, prop);
          if (descriptor && descriptor.set) {
            Object.defineProperty(CSSStyleDeclaration.prototype, prop, {
              get: descriptor.get,
              set(value) {
                descriptor.set.call(this, fixCssUrls(value));
              },
            });
          }
        }
      })();
    </script>
